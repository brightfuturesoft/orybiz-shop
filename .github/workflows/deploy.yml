name: Build and Deploy Next.js App

on:
  push:
    branches:
      - main

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 — BUILD
  # ─────────────────────────────────────────────
  build:
    name: Build Next.js App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Next.js project
        run: pnpm run build

      - name: Compile next.config.ts → next.config.mjs
        run: |
          # esbuild ships with Next.js — no extra install needed.
          # Compiling to .mjs means the VPS never needs TypeScript at runtime,
          # which prevents Next.js auto-installing TypeScript on every `next start`.
          ./node_modules/.bin/esbuild next.config.ts \
            --bundle=false \
            --platform=node \
            --format=esm \
            --outfile=next.config.mjs

      - name: Package release bundle
        run: |
          # next.config.mjs — pre-compiled JS, no TypeScript needed on the VPS
          tar -czf release.tar.gz \
            .next \
            public \
            package.json \
            pnpm-lock.yaml \
            next.config.mjs

      - name: Upload release bundle
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-release
          path: release.tar.gz
          retention-days: 1

  # ─────────────────────────────────────────────
  # JOB 2 — DEPLOY
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download release bundle
        uses: actions/download-artifact@v4
        with:
          name: nextjs-release
          path: .

      - name: Install sshpass (for password-based SSH/SCP)
        run: sudo apt-get install -y sshpass

      - name: Ensure deploy directory exists on VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
        run: |
          sshpass -p "$VPS_PASSWORD" ssh \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            "$VPS_USER@$VPS_HOST" \
            "mkdir -p /var/www/orybizz-shop"

      - name: Upload release bundle to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
        run: |
          sshpass -p "$VPS_PASSWORD" scp \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            release.tar.gz \
            "$VPS_USER@$VPS_HOST:/var/www/orybizz-shop/"

      - name: Extract, install prod deps & restart app on VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
        run: |
          sshpass -p "$VPS_PASSWORD" ssh \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            "$VPS_USER@$VPS_HOST" << 'EOF'
              set -e

              # Load NVM and pnpm PATH for non-interactive shell
              export NVM_DIR="$HOME/.nvm"
              [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
              export PATH="$HOME/.local/share/pnpm:$PATH"

              cd /var/www/orybizz-shop
              tar -xzf release.tar.gz

              # Set an explicit pnpm store dir to avoid the ENOENT /.pnpm-store error
              export PNPM_HOME="$HOME/.local/share/pnpm"
              export PATH="$PNPM_HOME:$PATH"
              pnpm config set store-dir "$HOME/.pnpm-store"
              pnpm install --prod --frozen-lockfile

              if pm2 describe orybizz-shop > /dev/null 2>&1; then
                echo 'Server is already running. Reloading...'
                pm2 reload orybizz-shop --update-env
              else
                echo 'Starting server for the first time...'
                pm2 start pnpm --name orybizz-shop --interpreter bash -- start
              fi

              rm -f release.tar.gz
              pm2 save
              echo "✅ Deployment complete"
          EOF

        