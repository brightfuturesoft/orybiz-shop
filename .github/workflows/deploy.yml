name: Build and Deploy Next.js App

on:
  push:
    branches:
      - main

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 — BUILD
  # ─────────────────────────────────────────────
  build:
    name: Build Next.js App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Next.js project
        run: pnpm run build

      - name: Package release bundle
        run: |
          tar -czf release.tar.gz \
            .next \
            public \
            package.json \
            pnpm-lock.yaml \
            next.config.* \
            2>/dev/null || true

      - name: Upload release bundle
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-release
          path: release.tar.gz
          retention-days: 1

  # ─────────────────────────────────────────────
  # JOB 2 — DEPLOY
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download release bundle
        uses: actions/download-artifact@v4
        with:
          name: nextjs-release
          path: .

      - name: Install sshpass (for password-based SSH/SCP)
        run: sudo apt-get install -y sshpass

      - name: Ensure deploy directory exists on VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
        run: |
          sshpass -p "$VPS_PASSWORD" ssh \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            "$VPS_USER@$VPS_HOST" \
            "mkdir -p /var/www/orybiz-shop"

      - name: Upload release bundle to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
        run: |
          sshpass -p "$VPS_PASSWORD" scp \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            release.tar.gz \
            "$VPS_USER@$VPS_HOST:/var/www/orybiz-shop/"

      - name: Extract, install prod deps & restart app on VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
        run: |
          sshpass -p "$VPS_PASSWORD" ssh \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            "$VPS_USER@$VPS_HOST" << 'EOF'
              set -e

              # Load NVM and pnpm PATH for non-interactive shell
              export NVM_DIR="$HOME/.nvm"
              [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
              export PATH="$HOME/.local/share/pnpm:$PATH"

              cd /var/www/orybiz-shop
              tar -xzf release.tar.gz
              pnpm install --prod --frozen-lockfile

              if pm2 describe orybiz-shop > /dev/null 2>&1; then
                echo 'Server is already running. Reloading...'
                pm2 reload orybiz-shop --update-env
              else
                echo 'Starting server for the first time...'
                pm2 start pnpm --name orybiz-shop --interpreter bash -- start
              fi

              rm -f release.tar.gz
              pm2 save
              echo "✅ Deployment complete"
          EOF

        