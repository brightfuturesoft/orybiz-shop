name: Build and Deploy Next.js App

on:
  push:
    branches:
      - main

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 — BUILD
  # ─────────────────────────────────────────────
  build:
    name: Build Next.js App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Next.js project
        run: pnpm run build
        # Next.js outputs to .next/ — this must exist on the server at runtime

      - name: Package release bundle
        run: |
          # Bundle only what Next.js needs to run in production:
          #   .next/       — compiled server + client assets
          #   public/      — static files served directly
          #   package.json + pnpm-lock.yaml — for prod install on VPS
          tar -czf release.tar.gz \
            .next \
            public \
            package.json \
            pnpm-lock.yaml \
            next.config.* \
            2>/dev/null || true   # ignore missing optional config files

      - name: Upload release bundle
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-release
          path: release.tar.gz
          retention-days: 1

  # ─────────────────────────────────────────────
  # JOB 2 — DEPLOY
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build             # Only runs after build succeeds

    steps:
      - name: Download release bundle
        uses: actions/download-artifact@v4
        with:
          name: nextjs-release
          path: .

      - name: Install sshpass (for password-based SSH/SCP)
        run: sudo apt-get install -y sshpass

      - name: Ensure deploy directory exists on VPS
        run: |
          sshpass -p "${{ secrets.VPS_PASSWORD }}" ssh \
            -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "mkdir -p /var/www/orybizz"

      - name: Upload release bundle to VPS
        run: |
          sshpass -p "${{ secrets.VPS_PASSWORD }}" scp \
            -o StrictHostKeyChecking=no \
            release.tar.gz \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/orybizz-shop/

      - name: Extract, install prod deps & restart app on VPS
        run: |
          sshpass -p "${{ secrets.VPS_PASSWORD }}" ssh \
            -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'
              set -e
              cd /var/www/orybizz-shop

              # Extract the new build on top of the existing directory
              tar -xzf release.tar.gz

              # Install / refresh production dependencies only
              # (pnpm must be installed globally on the VPS)
              pnpm install --prod --frozen-lockfile

              # Restart the app via PM2 (process name: orybizz-shop)
              # If PM2 is not set up yet, run on VPS once:
              if pm2 describe orybizz-shop > /dev/null 2>&1; then
                echo 'Server is already running. Reloading...'
                pm2 reload orybizz-shop --update-env
              else
                echo 'Starting server for the first time...'
                pm2 start pnpm --name orybizz-shop --interpreter bash -- start
              fi

              # Clean up the archive
              rm -f release.tar.gz

              echo "✅ Deployment complete"
          EOF
